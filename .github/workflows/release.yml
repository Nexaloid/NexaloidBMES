name: Release BMES Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: true
      confirm_license_clearance:
        description: Confirm every bundled data/model source is cleared for this release
        required: true
        type: boolean
        default: false
      model_license_spdx:
        description: SPDX license identifier for the released model artifact
        required: true
        default: NOASSERTION

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build artifact
        env:
          MODEL_LICENSE_SPDX: ${{ inputs.model_license_spdx }}
        run: |
          test "${{ inputs.confirm_license_clearance }}" = "true" || { echo "License clearance confirmation is required" >&2; exit 1; }
          test "$MODEL_LICENSE_SPDX" != "NOASSERTION" || { echo "A model SPDX license is required" >&2; exit 1; }
          grep -Fqx "SPDX-License-Identifier: $MODEL_LICENSE_SPDX" data/releases/bmes/MODEL_LICENSE.txt || { echo "MODEL_LICENSE.txt does not match the requested SPDX license" >&2; exit 1; }
          grep -Fqx "Distribution: public" data/releases/bmes/MODEL_LICENSE.txt || { echo "MODEL_LICENSE.txt is not cleared for public distribution" >&2; exit 1; }
          python3 tools/check_entity_bmes_quality.py
          python3 tools/export_nxbmes.py --distribution public --license-spdx "$MODEL_LICENSE_SPDX"
          python3 tools/check_nxbmes.py

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          case "$RELEASE_VERSION" in
            v*) RELEASE_TAG="$RELEASE_VERSION" ;;
            *) RELEASE_TAG="v$RELEASE_VERSION" ;;
          esac
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; BMES releases are immutable" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Nexaloid BMES artifact $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" \
            data/releases/bmes/entity_bmes_perceptron.nxbmes \
            data/releases/bmes/entity_bmes_perceptron.nxbmes.sha256 \
            data/releases/bmes/entity_bmes_perceptron.manifest.json \
            data/releases/bmes/MODEL_LICENSE.txt
