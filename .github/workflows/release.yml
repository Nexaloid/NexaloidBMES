name: Release BMES Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build artifact
        run: |
          python3 tools/check_entity_bmes_quality.py \
            --model data/tasks/entity_release_combined/entity_release_perceptron.json \
            --data-dir data/tasks/entity_release_combined \
            --min-dev-f1 0.79 --min-test-f1 0.86
          python3 tools/export_nxbmes.py \
            --model data/tasks/entity_release_combined/entity_release_perceptron.json \
            --out data/releases/bmes-public/entity_bmes_perceptron.nxbmes \
            --manifest data/releases/bmes-public/entity_bmes_perceptron.manifest.json \
            --distribution public --license-spdx Apache-2.0
          python3 tools/check_nxbmes.py \
            --artifact data/releases/bmes-public/entity_bmes_perceptron.nxbmes \
            --manifest data/releases/bmes-public/entity_bmes_perceptron.manifest.json \
            --min-feature-count 14000 --min-general-count 74000 --min-entity-count 6900
          grep -Fqx "Distribution: public" data/releases/bmes-public/MODEL_LICENSE.txt
          grep -Fqx "SPDX-License-Identifier: Apache-2.0" data/releases/bmes-public/MODEL_LICENSE.txt
          cmp -s LICENSE data/releases/bmes-public/APACHE-2.0.txt
          git diff --exit-code -- data/releases/bmes-public

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          case "$RELEASE_VERSION" in
            v*) RELEASE_TAG="$RELEASE_VERSION" ;;
            *) RELEASE_TAG="v$RELEASE_VERSION" ;;
          esac
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; BMES releases are immutable" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Nexaloid BMES artifact $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" \
            data/releases/bmes-public/entity_bmes_perceptron.nxbmes \
            data/releases/bmes-public/entity_bmes_perceptron.nxbmes.sha256 \
            data/releases/bmes-public/entity_bmes_perceptron.manifest.json \
            data/releases/bmes-public/APACHE-2.0.txt \
            data/releases/bmes-public/MODEL_LICENSE.txt \
            data/releases/bmes-public/THIRD_PARTY_NOTICES.txt
